<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanal Gardırop Studio 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --accent-pink: #e07a9b;
            --accent-pink-hover: #c96283;
            --accent-soft: #fbe6ee;
            --lavender: #9b7bc7;
            --mint: #4cb386;
            --mint-soft: #e3f7ee;
            --text-dark: #3a2d35;
            --text-muted: #8a7a83;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(138, 100, 150, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            padding: 40px 16px;
            /* Canlı Animasyonlu Arka Plan */
            background: linear-gradient(-45deg, #fdf4f7, #f4e8f6, #fceaf0, #eef5f9);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .brand-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-style: italic;
            font-weight: 600;
            color: var(--text-dark);
            margin: 0;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }

        .brand-header h1 span { color: var(--accent-pink); }

        .brand-header p#uploadStatus {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 999px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        .brand-header p#uploadStatus.toast-success { color: var(--mint); background: #f0fdf6; border-color: #c2eed9; }
        .brand-header p#uploadStatus.toast-error { color: #d9534f; background: #fff2f2; border-color: #fad1d1; }
        .brand-header p#uploadStatus.toast-loading { color: var(--accent-pink); background: #fff0f5; border-color: #fce1ea; }

        /* Sanal Kabin Container */
        #canvas-container {
            position: relative;
            width: 380px;
            height: 570px;
            border: 6px solid #ffffff;
            border-radius: 36px;
            box-shadow: 0 35px 60px -15px rgba(138, 100, 150, 0.25), 0 0 0 1px rgba(255,255,255,0.5) inset;
            overflow: hidden;
            background-color: #faf6f8;
            transition: all 0.3s ease;
        }

        /* Drag & Drop Efekti */
        #canvas-container.drag-active {
            border-color: var(--accent-pink);
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(224, 122, 155, 0.4);
        }
        #canvas-container.drag-active::after {
            content: "Kıyafeti Buraya Bırak 🎀";
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(4px);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-pink);
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #bgCanvas { z-index: 1; }
        #clothingCanvas { z-index: 2; cursor: move; }

        #emptyHint {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            pointer-events: none;
        }
        #emptyHint span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.95);
            border: 2px dashed rgba(224, 122, 155, 0.3);
            padding: 16px 24px;
            border-radius: 20px;
            line-height: 1.6;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        #activeLayerLabel {
            margin-top: 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            z-index: 10;
        }

        /* Atmosfer Filtreleri (Yeni Özellik) */
        .filter-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            justify-content: center;
            width: 380px;
        }
        .filter-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }
        .filter-btn:hover { background: #fff; transform: translateY(-1px); }
        .filter-btn.active { background: var(--lavender); color: #fff; border-color: var(--lavender); }

        /* Gardırop */
        #wardrobe {
            margin-top: 12px;
            width: 380px;
            display: flex;
            gap: 12px;
            align-items: center;
            overflow-x: auto;
            padding: 6px 4px 16px 4px;
            z-index: 10;
        }
        #wardrobe::-webkit-scrollbar { height: 5px; }
        #wardrobe::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        #wardrobeItems { display: flex; gap: 12px; }

        .wardrobe-item {
            position: relative;
            flex-shrink: 0;
            width: 68px;
            height: 68px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            border: 3px solid #ffffff;
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .wardrobe-item:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.2); }
        .wardrobe-item.active { border-color: var(--accent-pink); box-shadow: 0 0 0 4px var(--accent-soft); }

        .wardrobe-item .remove-x {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ffffff;
            color: #d9534f;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            opacity: 0;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .wardrobe-item:hover .remove-x { opacity: 1; }
        .wardrobe-item .remove-x:hover { transform: scale(1.15); background: #d9534f; color: #fff; }

        .wardrobe-add {
            flex-shrink: 0;
            width: 68px;
            height: 68px;
            border-radius: 20px;
            border: 2px dashed #cfb9c4;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }
        .wardrobe-add:hover { border-color: var(--accent-pink); color: var(--accent-pink); background: #ffffff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(224, 122, 155, 0.15); }
        #imageInput { display: none; }

        /* Kontrol Paneli */
        #controls {
            margin-top: 4px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 28px 24px;
            border-radius: 36px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 380px;
            box-shadow: var(--glass-shadow);
            z-index: 10;
        }

        .slider-group { display: flex; flex-direction: column; gap: 8px; }
        .slider-header { display: flex; justify-content: space-between; align-items: center; }
        .slider-header label { font-size: 11.5px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .slider-val { font-size: 12px; color: var(--text-dark); font-weight: 700; }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(0,0,0,0.06);
            height: 6px;
            border-radius: 4px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: 5px solid var(--accent-pink);
            box-shadow: 0 4px 10px rgba(224, 122, 155, 0.3);
            transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
        #rotateSlider::-webkit-slider-thumb { border-color: var(--lavender); box-shadow: 0 4px 10px rgba(155, 123, 199, 0.3); }
        #brightnessSlider::-webkit-slider-thumb { border-color: var(--mint); box-shadow: 0 4px 10px rgba(76, 179, 134, 0.3); }
        #contrastSlider::-webkit-slider-thumb { border-color: #f0ad4e; box-shadow: 0 4px 10px rgba(240, 173, 78, 0.3); }
        input[type=range]:disabled { opacity: 0.4; }

        .actions-row { display: flex; gap: 10px; width: 100%; }

        .icon-btn {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            background-color: rgba(255,255,255,0.7);
            color: var(--text-dark);
            border: 1px solid rgba(255,255,255,0.9);
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .icon-btn:hover { background-color: #ffffff; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.06); }
        .icon-btn.active { background: var(--accent-pink); color: white; border-color: transparent; box-shadow: 0 8px 16px rgba(224, 122, 155, 0.35); }

        .pill-btn {
            flex: 1.4;
            background: var(--text-dark);
            color: white;
            padding: 14px;
            border-radius: 16px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(58, 45, 53, 0.2);
            transition: all 0.2s ease;
        }
        .pill-btn:hover { background: #4e3f49; transform: translateY(-2px); box-shadow: 0 12px 30px rgba(58, 45, 53, 0.3); }
        .pill-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Sevgi Dolu Animasyon Kalpleri */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 9999;
            opacity: 1;
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5) rotate(45deg); opacity: 0; }
        }

        .heart-decor { position: fixed; font-size: 16px; opacity: 0.4; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>

    <span class="heart-decor" style="top:10%; left:8%;">💕</span>
    <span class="heart-decor" style="top:25%; right:10%;">✨</span>
    <span class="heart-decor" style="bottom:15%; left:12%;">🎀</span>
    <span class="heart-decor" style="bottom:20%; right:8%;">🌸</span>

    <div class="brand-header">
        <h1>2 kuzu kulagi <span>Askim burasi Zara</span></h1>
        <p id="uploadStatus">Yiğit tarafindan biricik aski cicegi bocegi sevgilisi her seyi Duru icin hazirlandi</p>
    </div>

    <div class="filter-row">
        <button class="filter-btn active" data-filter="none">Orijinal</button>
        <button class="filter-btn" data-filter="sepia(0.6) contrast(1.1) brightness(0.9)">Nostaljik</button>
        <button class="filter-btn" data-filter="grayscale(1) contrast(1.2)">Siyah Beyaz</button>
        <button class="filter-btn" data-filter="brightness(0.8) contrast(1.2) saturate(1.1)">Sinematik</button>
    </div>

    <div id="canvas-container">
        <canvas id="bgCanvas" width="400" height="600"></canvas>
        <canvas id="clothingCanvas" width="400" height="600"></canvas>
        <div id="emptyHint"><span>✨ Başlamak için Zara'dan bir kıyafeti<br>buraya sürükle veya aşağıdan ekle askim</span></div>
    </div>

    <p id="activeLayerLabel">Seçili kıyafet: yok</p>

    <div id="wardrobe">
        <div id="wardrobeItems"></div>
        <label for="imageInput" class="wardrobe-add" id="uploadBtnLabel">
            <i class="fa-solid fa-plus"></i>
        </label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="controls">
        <div class="slider-group">
            <div class="slider-header">
                <label for="scaleSlider">Boyutlandırma</label>
                <span class="slider-val" id="scaleVal">100%</span>
            </div>
            <input type="range" id="scaleSlider" min="0.1" max="3.0" step="0.01" value="1.0">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label for="rotateSlider">Açı Döndürme</label>
                <span class="slider-val" id="rotateVal">0°</span>
            </div>
            <input type="range" id="rotateSlider" min="0" max="360" step="1" value="0">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label for="brightnessSlider">Kıyafet Işığı</label>
                <span class="slider-val" id="brightnessVal">100%</span>
            </div>
            <input type="range" id="brightnessSlider" min="0" max="200" step="1" value="100">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <label for="contrastSlider">Kontrast</label>
                <span class="slider-val" id="contrastVal">100%</span>
            </div>
            <input type="range" id="contrastSlider" min="0" max="200" step="1" value="100">
        </div>

        <div class="actions-row">
            <button class="icon-btn" id="mirrorBtn" title="Yönü Ters Çevir"><i class="fa-solid fa-arrows-left-right"></i> Aynala</button>
            <button class="icon-btn" id="layerUpBtn" title="Öne Getir"><i class="fa-solid fa-layer-group"></i> Öne Al</button>
            <button class="icon-btn" id="layerDownBtn" title="Arkaya Gönder"><i class="fa-solid fa-arrow-down-z-a"></i> Arkaya İt</button>
        </div>

        <div class="actions-row">
            <button class="icon-btn" id="eraserBtn"><i class="fa-solid fa-eraser"></i> Silgi</button>
            <button class="icon-btn" id="undoBtn"><i class="fa-solid fa-arrow-rotate-left"></i> Geri</button>
            <button class="icon-btn" id="resetBtn"><i class="fa-solid fa-crop-simple"></i> Sıfırla</button>
        </div>

        <div class="actions-row">
            <button class="icon-btn" id="deleteLayerBtn" style="color: #d9534f; border-color: rgba(217,83,79,0.2);"><i class="fa-solid fa-trash"></i> Çıkar</button>
            <button class="pill-btn" id="saveBtn"><i class="fa-solid fa-heart"></i> Görseli Kaydet</button>
        </div>
    </div>

    <script>
        const API_KEY = 'wSbk5AyhVcmqJuMR3G3VtrHd';

        const VISUAL_WIDTH = 400;
        const VISUAL_HEIGHT = 600;
        const RENDER_SCALE = 3;
        const DEFAULT_STATUS_TEXT = "Yiğit tarafindan biricik aski cicegi bocegi sevgilisi her seyi Duru icin hazirlandi";
        const MAX_UNDO_STEPS = 15;

        const bgCanvas = document.getElementById('bgCanvas');
        const ctx_bg = bgCanvas.getContext('2d');
        const clothingCanvas = document.getElementById('clothingCanvas');
        const ctx_clothing = clothingCanvas.getContext('2d');

        const scaleSlider = document.getElementById('scaleSlider');
        const rotateSlider = document.getElementById('rotateSlider');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const contrastSlider = document.getElementById('contrastSlider');
        
        const scaleVal = document.getElementById('scaleVal');
        const rotateVal = document.getElementById('rotateVal');
        const brightnessVal = document.getElementById('brightnessVal');
        const contrastVal = document.getElementById('contrastVal');
        
        const eraserBtn = document.getElementById('eraserBtn');
        const undoBtn = document.getElementById('undoBtn');
        const resetBtn = document.getElementById('resetBtn');
        const deleteLayerBtn = document.getElementById('deleteLayerBtn');
        const saveBtn = document.getElementById('saveBtn');
        const mirrorBtn = document.getElementById('mirrorBtn');
        const layerUpBtn = document.getElementById('layerUpBtn');
        const layerDownBtn = document.getElementById('layerDownBtn');
        const imageInput = document.getElementById('imageInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadBtnLabel = document.getElementById('uploadBtnLabel');
        const canvasContainer = document.getElementById('canvas-container');
        const emptyHint = document.getElementById('emptyHint');
        const wardrobeItemsEl = document.getElementById('wardrobeItems');
        const activeLayerLabel = document.getElementById('activeLayerLabel');

        let currentBgFilter = 'none'; // Atmosfer Filtresi

        function setupHiDPICanvas(canvas, ctx) {
            canvas.width = VISUAL_WIDTH * RENDER_SCALE;
            canvas.height = VISUAL_HEIGHT * RENDER_SCALE;
            ctx.scale(RENDER_SCALE, RENDER_SCALE);
        }
        setupHiDPICanvas(bgCanvas, ctx_bg);
        setupHiDPICanvas(clothingCanvas, ctx_clothing);

        const bgImg = new Image();
        bgImg.src = 'duru.jpg';
        bgImg.onload = drawBackground;

        function drawBackground() {
            ctx_bg.clearRect(0, 0, VISUAL_WIDTH, VISUAL_HEIGHT);
            ctx_bg.filter = currentBgFilter;
            ctx_bg.drawImage(bgImg, 0, 0, VISUAL_WIDTH, VISUAL_HEIGHT);
            ctx_bg.filter = 'none'; // Çizim bittikten sonra sıfırla
        }

        // Atmosfer Butonları Dinleyicisi
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentBgFilter = e.target.dataset.filter;
                drawBackground();
            });
        });

        // Sürükle-Bırak (Drag & Drop) Dinleyicileri
        canvasContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            canvasContainer.classList.add('drag-active');
        });
        canvasContainer.addEventListener('dragleave', (e) => {
            e.preventDefault();
            canvasContainer.classList.remove('drag-active');
        });
        canvasContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            canvasContainer.classList.remove('drag-active');
            if(e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if(file.type.startsWith('image/')) {
                    processImageFile(file);
                }
            }
        });

        let layers = [];         
        let wardrobeItems = [];  
        let activeLayerId = null;
        let eraserState = { active: false, isDrawing: false, radius: 12, lastPos: null };

        function getActiveLayer() { return layers.find(l => l.id === activeLayerId) || null; }

        function updateEmptyHint() {
            emptyHint.style.display = layers.length === 0 ? 'flex' : 'none';
        }

        function showToast(msg, type) {
            uploadStatus.innerText = msg;
            uploadStatus.classList.remove('toast-success', 'toast-error', 'toast-loading');
            if (type) uploadStatus.classList.add('toast-' + type);
            clearTimeout(showToast._t);
            if (type !== 'loading') {
                showToast._t = setTimeout(() => {
                    uploadStatus.innerText = DEFAULT_STATUS_TEXT;
                    uploadStatus.classList.remove('toast-success', 'toast-error', 'toast-loading');
                }, 2600);
            }
        }

        function needsLayerWarning() { showToast('Lütfen önce bir kıyafet seçin 💭', 'error'); }

        function createLayerFromImage(img, wardrobeId) {
            const w = img.naturalWidth, h = img.naturalHeight;
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            return {
                id: 'layer_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
                wardrobeId, canvas, ctx,
                naturalW: w, naturalH: h,
                w: w / RENDER_SCALE, h: h / RENDER_SCALE,
                x: VISUAL_WIDTH / 2, y: VISUAL_HEIGHT / 2,
                scale: 1.0, rotation: 0, isFlipped: false,
                brightness: 100, contrast: 100,
                undoStack: [],
                isDragging: false, offsetX: 0, offsetY: 0
            };
        }

        function setActiveLayer(id) {
            activeLayerId = id;
            const layer = getActiveLayer();
            
            scaleSlider.disabled = !layer;
            rotateSlider.disabled = !layer;
            brightnessSlider.disabled = !layer;
            contrastSlider.disabled = !layer;
            
            if (layer) {
                scaleSlider.value = layer.scale;
                const deg = Math.round(layer.rotation * 180 / Math.PI);
                rotateSlider.value = deg;
                brightnessSlider.value = layer.brightness;
                contrastSlider.value = layer.contrast;

                scaleVal.innerText = Math.round(layer.scale * 100) + '%';
                rotateVal.innerText = deg + '°';
                brightnessVal.innerText = layer.brightness + '%';
                contrastVal.innerText = layer.contrast + '%';
                
                if(layer.isFlipped) mirrorBtn.classList.add('active');
                else mirrorBtn.classList.remove('active');

                const item = wardrobeItems.find(w => w.id === layer.wardrobeId);
                activeLayerLabel.innerText = 'Seçili: ' + (item ? item.name : 'kıyafet');
            } else {
                activeLayerLabel.innerText = 'Seçili kıyafet: yok';
                mirrorBtn.classList.remove('active');
                brightnessVal.innerText = '100%';
                contrastVal.innerText = '100%';
            }
            renderWardrobe();
            drawClothing();
        }

        function drawClothing(showSelection = true) {
            ctx_clothing.clearRect(0, 0, VISUAL_WIDTH, VISUAL_HEIGHT);
            layers.forEach(layer => {
                ctx_clothing.save();
                ctx_clothing.filter = `brightness(${layer.brightness}%) contrast(${layer.contrast}%)`;
                ctx_clothing.translate(layer.x, layer.y);
                ctx_clothing.rotate(layer.rotation);
                if (layer.isFlipped) ctx_clothing.scale(-1, 1);

                const dispW = layer.w * layer.scale, dispH = layer.h * layer.scale;
                ctx_clothing.drawImage(layer.canvas, -dispW / 2, -dispH / 2, dispW, dispH);
                ctx_clothing.restore();

                if (showSelection && layer.id === activeLayerId) {
                    ctx_clothing.save();
                    ctx_clothing.filter = 'none';
                    ctx_clothing.translate(layer.x, layer.y);
                    ctx_clothing.rotate(layer.rotation);
                    ctx_clothing.strokeStyle = 'rgba(224, 122, 155, 0.8)';
                    ctx_clothing.lineWidth = 1.5;
                    ctx_clothing.setLineDash([6, 4]);
                    ctx_clothing.strokeRect(-dispW / 2, -dispH / 2, dispW, dispH);
                    ctx_clothing.restore();
                }
            });
        }

        scaleSlider.addEventListener('input', (e) => {
            const layer = getActiveLayer();
            if (!layer) return;
            layer.scale = parseFloat(e.target.value);
            scaleVal.innerText = `${Math.round(layer.scale * 100)}%`;
            drawClothing();
        });

        rotateSlider.addEventListener('input', (e) => {
            const layer = getActiveLayer();
            if (!layer) return;
            const deg = parseInt(e.target.value);
            layer.rotation = deg * (Math.PI / 180);
            rotateVal.innerText = `${deg}°`;
            drawClothing();
        });

        brightnessSlider.addEventListener('input', (e) => {
            const layer = getActiveLayer();
            if (!layer) return;
            layer.brightness = parseInt(e.target.value);
            brightnessVal.innerText = `${layer.brightness}%`;
            drawClothing();
        });

        contrastSlider.addEventListener('input', (e) => {
            const layer = getActiveLayer();
            if (!layer) return;
            layer.contrast = parseInt(e.target.value);
            contrastVal.innerText = `${layer.contrast}%`;
            drawClothing();
        });

        mirrorBtn.addEventListener('click', () => {
            const layer = getActiveLayer();
            if (!layer) return needsLayerWarning();
            layer.isFlipped = !layer.isFlipped;
            mirrorBtn.classList.toggle('active', layer.isFlipped);
            drawClothing();
        });

        layerUpBtn.addEventListener('click', () => {
            const idx = layers.findIndex(l => l.id === activeLayerId);
            if (idx === -1) return needsLayerWarning();
            if (idx < layers.length - 1) {
                const temp = layers[idx];
                layers[idx] = layers[idx + 1];
                layers[idx + 1] = temp;
                drawClothing();
                showToast('Kıyafet öne getirildi', 'success');
            }
        });

        layerDownBtn.addEventListener('click', () => {
            const idx = layers.findIndex(l => l.id === activeLayerId);
            if (idx === -1) return needsLayerWarning();
            if (idx > 0) {
                const temp = layers[idx];
                layers[idx] = layers[idx - 1];
                layers[idx - 1] = temp;
                drawClothing();
                showToast('Kıyafet arkaya itildi', 'success');
            }
        });

        eraserBtn.addEventListener('click', () => {
            eraserState.active = !eraserState.active;
            eraserBtn.classList.toggle('active');
            clothingCanvas.style.cursor = eraserState.active ? 'crosshair' : 'move';
        });

        undoBtn.addEventListener('click', () => {
            const layer = getActiveLayer();
            if (!layer) return needsLayerWarning();
            if (!layer.undoStack.length) return showToast('Geri alınacak düzenleme yok', 'error');
            const snap = layer.undoStack.pop();
            layer.ctx.putImageData(snap, 0, 0);
            drawClothing();
        });

        resetBtn.addEventListener('click', () => {
            const layer = getActiveLayer();
            if (!layer) return needsLayerWarning();
            layer.x = VISUAL_WIDTH / 2; layer.y = VISUAL_HEIGHT / 2;
            layer.scale = 1.0; layer.rotation = 0; layer.isFlipped = false;
            layer.brightness = 100; layer.contrast = 100;
            
            scaleSlider.value = 1.0; rotateSlider.value = 0;
            brightnessSlider.value = 100; contrastSlider.value = 100;
            
            scaleVal.innerText = '100%'; rotateVal.innerText = '0°';
            brightnessVal.innerText = '100%'; contrastVal.innerText = '100%';
            
            mirrorBtn.classList.remove('active');
            drawClothing();
        });

        deleteLayerBtn.addEventListener('click', () => {
            const layer = getActiveLayer();
            if (!layer) return needsLayerWarning();
            layers = layers.filter(l => l.id !== layer.id);
            activeLayerId = null;
            updateEmptyHint();
            setActiveLayer(null);
        });

        // Kalp Uçurma Animasyon Fonksiyonu
        function spawnHearts() {
            const emojis = ['💖', '🎀', '🌸', '✨'];
            for(let i=0; i<20; i++) {
                let h = document.createElement('div');
                h.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                h.className = 'floating-heart';
                h.style.left = Math.random() * 100 + 'vw';
                h.style.top = '100vh';
                h.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 3500);
            }
        }

        saveBtn.addEventListener('click', () => {
            drawClothing(false); 
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = bgCanvas.width;
            exportCanvas.height = bgCanvas.height;
            const ectx = exportCanvas.getContext('2d');
            
            // Arka planı (filtreli haliyle) çiz
            ectx.filter = currentBgFilter;
            ectx.drawImage(bgImg, 0, 0, VISUAL_WIDTH, VISUAL_HEIGHT);
            ectx.filter = 'none';

            // Kıyafetleri çiz
            ectx.drawImage(clothingCanvas, 0, 0);
            
            const link = document.createElement('a');
            link.download = 'duru-harika-kombin-' + Date.now() + '.png';
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
            drawClothing(true);
            showToast('Görsel başarıyla kaydedildi! 📸', 'success');
            spawnHearts(); // Sürpriz Kalp Animasyonunu Tetikle!
        });

        // --- POINTER MOUSE/TOUCH HANDLING ---
        function getMousePos(e) {
            const rect = clothingCanvas.getBoundingClientRect();
            const scaleX = VISUAL_WIDTH / rect.width;
            const scaleY = VISUAL_HEIGHT / rect.height;
            const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
            const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function hitTestLayer(layer, px, py) {
            const dx = px - layer.x, dy = py - layer.y;
            const cos = Math.cos(-layer.rotation), sin = Math.sin(-layer.rotation);
            let lx = dx * cos - dy * sin;
            let ly = dx * sin + dy * cos;
            const halfW = (layer.w * layer.scale) / 2;
            const halfH = (layer.h * layer.scale) / 2;
            return lx > -halfW && lx < halfW && ly > -halfH && ly < halfH;
        }

        function layerSpacePoint(layer, px, py) {
            const dx = px - layer.x, dy = py - layer.y;
            const cos = Math.cos(-layer.rotation), sin = Math.sin(-layer.rotation);
            let lx = dx * cos - dy * sin;
            let ly = dx * sin + dy * cos;
            if (layer.isFlipped) lx = -lx;
            const ux = (lx / layer.scale) * RENDER_SCALE + layer.canvas.width / 2;
            const uy = (ly / layer.scale) * RENDER_SCALE + layer.canvas.height / 2;
            return { x: ux, y: uy };
        }

        function pushUndoSnapshot(layer) {
            if (layer.undoStack.length >= MAX_UNDO_STEPS) layer.undoStack.shift();
            layer.undoStack.push(layer.ctx.getImageData(0, 0, layer.canvas.width, layer.canvas.height));
        }

        function eraseAt(layer, x, y) {
            const p = layerSpacePoint(layer, x, y);
            const r = (eraserState.radius / layer.scale) * RENDER_SCALE;
            layer.ctx.save();
            layer.ctx.globalCompositeOperation = 'destination-out';
            layer.ctx.beginPath();
            layer.ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            layer.ctx.fill();
            layer.ctx.restore();
        }

        function eraseSegment(layer, from, to) {
            const dist = Math.hypot(to.x - from.x, to.y - from.y);
            const steps = Math.max(1, Math.ceil(dist / 4));
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                eraseAt(layer, from.x + (to.x - from.x) * t, from.y + (to.y - from.y) * t);
            }
        }

        clothingCanvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            if (eraserState.active) {
                const layer = getActiveLayer();
                if (!layer) return needsLayerWarning();
                eraserState.isDrawing = true;
                eraserState.lastPos = pos;
                pushUndoSnapshot(layer);
                eraseAt(layer, pos.x, pos.y);
                drawClothing();
                return;
            }
            for (let i = layers.length - 1; i >= 0; i--) {
                if (hitTestLayer(layers[i], pos.x, pos.y)) {
                    const layer = layers[i];
                    setActiveLayer(layer.id);
                    layer.isDragging = true;
                    layer.offsetX = pos.x - layer.x;
                    layer.offsetY = pos.y - layer.y;
                    break;
                }
            }
        });

        document.addEventListener('mousemove', (e) => {
            const draggingLayer = layers.find(l => l.isDragging);
            if ((eraserState.active && eraserState.isDrawing) || draggingLayer) {
                if (e.cancelable) e.preventDefault();
            }
            const pos = getMousePos(e);
            if (eraserState.active && eraserState.isDrawing) {
                const layer = getActiveLayer();
                if (layer) {
                    eraseSegment(layer, eraserState.lastPos, pos);
                    eraserState.lastPos = pos;
                    drawClothing();
                }
            } else if (draggingLayer) {
                draggingLayer.x = pos.x - draggingLayer.offsetX;
                draggingLayer.y = pos.y - draggingLayer.offsetY;
                drawClothing();
            }
        }, { passive: false });

        document.addEventListener('mouseup', () => {
            layers.forEach(l => l.isDragging = false);
            eraserState.isDrawing = false;
        });

        clothingCanvas.addEventListener('touchstart', (e) => { canvasDispatch(e, 'mousedown'); }, { passive: false });
        clothingCanvas.addEventListener('touchmove', (e) => { canvasDispatch(e, 'mousemove'); }, { passive: false });
        clothingCanvas.addEventListener('touchend', (e) => { canvasDispatch(e, 'mouseup'); }, { passive: false });

        function canvasDispatch(e, type) {
            if (e.touches.length > 1) return;
            e.preventDefault();
            const touch = e.changedTouches[0];
            const mouseEvent = new MouseEvent(type, { clientX: touch.clientX, clientY: touch.clientY });
            clothingCanvas.dispatchEvent(mouseEvent);
        }

        function makeThumbnail(img, size = 120) {
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const cctx = c.getContext('2d');
            const ratio = Math.min(size / img.naturalWidth, size / img.naturalHeight);
            const w = img.naturalWidth * ratio, h = img.naturalHeight * ratio;
            cctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
            return c.toDataURL('image/png');
        }

        function renderWardrobe() {
            wardrobeItemsEl.innerHTML = '';
            wardrobeItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'wardrobe-item';
                div.style.backgroundImage = `url(${item.thumb})`;
                const linkedLayer = layers.find(l => l.wardrobeId === item.id);
                if (linkedLayer && linkedLayer.id === activeLayerId) div.classList.add('active');

                const x = document.createElement('div');
                x.className = 'remove-x';
                x.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                x.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    wardrobeItems = wardrobeItems.filter(w => w.id !== item.id);
                    layers = layers.filter(l => l.wardrobeId !== item.id);
                    if (!layers.find(l => l.id === activeLayerId)) activeLayerId = null;
                    updateEmptyHint();
                    setActiveLayer(activeLayerId);
                });
                div.appendChild(x);

                div.addEventListener('click', () => {
                    const existing = layers.find(l => l.wardrobeId === item.id);
                    if (existing) {
                        setActiveLayer(existing.id);
                    } else {
                        const layer = createLayerFromImage(item.img, item.id);
                        layers.push(layer);
                        updateEmptyHint();
                        setActiveLayer(layer.id);
                    }
                });
                wardrobeItemsEl.appendChild(div);
            });
        }

        // Merkezi Yükleme ve Fetch Fonksiyonu (Hem buton hem de sürükle bırak için)
        async function processImageFile(file) {
            showToast('✨ Yapay zeka çalışıyor...', 'loading');
            uploadBtnLabel.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            uploadBtnLabel.classList.add('disabled');
            imageInput.disabled = true;

            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');

            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: { 'X-Api-Key': API_KEY },
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const objectURL = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = () => {
                        const item = {
                            id: 'w_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
                            img,
                            thumb: makeThumbnail(img),
                            name: 'Kıyafet ' + (wardrobeItems.length + 1)
                        };
                        wardrobeItems.push(item);
                        const layer = createLayerFromImage(img, item.id);
                        layers.push(layer);
                        updateEmptyHint();
                        setActiveLayer(layer.id);
                        renderWardrobe();
                        showToast('🎉 Kıyafet gardırobuna eklendi!', 'success');
                        resetUploadUI();
                    };
                    img.src = objectURL;
                } else {
                    showToast('😿 API hatası, istek reddedildi.', 'error');
                    resetUploadUI();
                }
            } catch (error) {
                showToast('😿 Bağlantı hatası oluştu.', 'error');
                resetUploadUI();
            }
        }

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) processImageFile(file);
        });

        function resetUploadUI() {
            uploadBtnLabel.innerHTML = '<i class="fa-solid fa-plus"></i>';
            uploadBtnLabel.classList.remove('disabled');
            imageInput.disabled = false;
            imageInput.value = '';
        }

        updateEmptyHint();
        setActiveLayer(null);
    </script>
</body>
